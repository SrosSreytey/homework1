<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 05 - tables</title>

</head>
<body>
   <h2>Students Score Table</h2>
   <table border="2">
    <thead>
    <tr>
        <th>No</th>
        <th>Name</th>
        <th>Subject</th>
        <th>Score</th>
    </tr>
   </thead>
    <tbody>
    <tr>
        <td>1</td>
        <td>Dara</td>
        <td>HTML</td>
        <td>90</td>
    </tr>
    <tr>
        <td>2</td>
        <td>Sophea</td>
        <td>CSS</td>
        <td>85</td>
    </tr>
    <tr>
        <td>3</td>
        <td>Vanna</td>
        <td>JavaScript</td>
        <td>88</td>
    </tr>
    </tbody>
    <tfoot>
    <tr>
        <td colspan="3">Class Average Score</td>
        <td>87.6</td>
    </tr>
    </tfoot>
   </table> 
</body>
</html>
